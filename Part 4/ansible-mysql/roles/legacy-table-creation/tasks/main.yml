---
- name: Create transaction_logs_flat table
  community.mysql.mysql_query:
    login_user: "{{ mysql_app_user }}"
    login_password: "{{ mysql_app_user_password }}"
    login_host: "{{ mysql_bind_address }}"
    login_port: "{{ mysql_port }}"
    login_db: "{{ legacy_db_name }}"
    query: |
      CREATE TABLE IF NOT EXISTS {{ legacy_table_name }} (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        created_at TIMESTAMP NOT NULL,
        brand_id INT NOT NULL,
        payload JSON NOT NULL
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci
  ignore_errors: yes

- name: Check row count in transaction_logs_flat
  community.mysql.mysql_query:
    login_user: "{{ mysql_app_user }}"
    login_password: "{{ mysql_app_user_password }}"
    login_host: "{{ mysql_bind_address }}"
    login_port: "{{ mysql_port }}"
    login_db: "{{ legacy_db_name }}"
    query: "SELECT COUNT(*) as row_count FROM {{ legacy_table_name }}"
  register: row_count_result
  ignore_errors: yes

- name: Set row count variable with proper type conversion
  ansible.builtin.set_fact:
    current_row_count: "{{ row_count_result.query_result[0][0].row_count | int }}"
  when: row_count_result is not failed

- name: Set row count to 0 if table doesn't exist
  ansible.builtin.set_fact:
    current_row_count: 0
  when: row_count_result is failed

- name: Display current row count
  ansible.builtin.debug:
    msg: "Current row count in {{ legacy_table_name }}: {{ current_row_count }}"

- name: Calculate rows to insert
  ansible.builtin.set_fact:
    rows_to_insert: "{{ (legacy_rows_count | int) - (current_row_count | int) }}"

- name: Display rows to insert
  ansible.builtin.debug:
    msg: "Rows to insert: {{ rows_to_insert }}"

- name: Populate transaction_logs_flat table with randomized data ( using cross join))
  ansible.builtin.shell:
    cmd: |
      mysql -u {{ mysql_app_user }} -p{{ mysql_app_user_password }} \
        -h {{ mysql_bind_address }} \
        -P {{ mysql_port }} \
        {{ legacy_db_name }} << 'EOF'
      SET SESSION group_concat_max_len = 1000000;

      DELIMITER $$
      DROP PROCEDURE IF EXISTS bulk_insert_transaction_logs$$
      CREATE PROCEDURE bulk_insert_transaction_logs(IN total_rows INT)
      BEGIN
        DECLARE inserted INT DEFAULT 0;
        DECLARE batch_size INT DEFAULT 10000;

        WHILE inserted < total_rows DO
          INSERT INTO {{ legacy_table_name }} (created_at, brand_id, payload)
          SELECT
            DATE_SUB(NOW(), INTERVAL FLOOR(RAND() * 365) DAY),
            FLOOR(1 + RAND() * 100),
            JSON_OBJECT(
              'id', UUID(),
              'state', ELT(FLOOR(1 + RAND() * 5), 'pending', 'completed', 'failed', 'cancelled', 'refunded')
            )
          FROM (
            SELECT 1 UNION SELECT 2 UNION SELECT 3 UNION SELECT 4 UNION SELECT 5
            UNION SELECT 6 UNION SELECT 7 UNION SELECT 8 UNION SELECT 9 UNION SELECT 10
          ) t1
          CROSS JOIN (
            SELECT 1 UNION SELECT 2 UNION SELECT 3 UNION SELECT 4 UNION SELECT 5
            UNION SELECT 6 UNION SELECT 7 UNION SELECT 8 UNION SELECT 9 UNION SELECT 10
          ) t2
          CROSS JOIN (
            SELECT 1 UNION SELECT 2 UNION SELECT 3 UNION SELECT 4 UNION SELECT 5
            UNION SELECT 6 UNION SELECT 7 UNION SELECT 8 UNION SELECT 9 UNION SELECT 10
          ) t3
          CROSS JOIN (
            SELECT 1 UNION SELECT 2 UNION SELECT 3 UNION SELECT 4 UNION SELECT 5
            UNION SELECT 6 UNION SELECT 7 UNION SELECT 8 UNION SELECT 9 UNION SELECT 10
          ) t4
          LIMIT batch_size;

          SET inserted = inserted + batch_size;
        END WHILE;
      END$$
      DELIMITER ;

      CALL bulk_insert_transaction_logs({{ rows_to_insert }});
      DROP PROCEDURE bulk_insert_transaction_logs;
      EOF
  when: rows_to_insert | int > 0 and current_row_count | int < legacy_rows_count | int
  async: 3600
  poll: 10
  ignore_errors: yes

- name: Verify final row count
  community.mysql.mysql_query:
    login_user: "{{ mysql_app_user }}"
    login_password: "{{ mysql_app_user_password }}"
    login_host: "{{ mysql_bind_address }}"
    login_port: "{{ mysql_port }}"
    login_db: "{{ legacy_db_name }}"
    query: "SELECT COUNT(*) as row_count FROM {{ legacy_table_name }}"
  register: final_row_count_result

- name: Display final row count
  ansible.builtin.debug:
    msg: "Final row count in {{ legacy_table_name }}: {{ final_row_count_result.query_result[0][0].row_count }}"

- name: Display skip message if table already populated
  ansible.builtin.debug:
    msg: "Table {{ legacy_table_name }} already has {{ current_row_count }} rows. Skipping population."
  when: current_row_count | int >= legacy_rows_count | int
