---
- name: Add MySQL repository (Rocky Linux/CentOS)
  ansible.builtin.yum_repository:
    name: mysql{{ mysql_version | replace('.', '') }}
    description: MySQL {{ mysql_version }} Community Server Repository
    baseurl: https://repo.mysql.com/yum/mysql-{{ mysql_version }}-community/el/{{ ansible_distribution_major_version }}/$basearch/
    enabled: yes
    gpgcheck: yes
    gpgkey: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
  when: ansible_os_family == "RedHat"

- name: Install MySQL Server
  ansible.builtin.yum:
    name: "mysql-community-server"
    state: present
  notify: start-mysql

- name: Create MySQL socket directory
  ansible.builtin.file:
    path: "{{ mysql_socket | dirname }}"
    state: directory
    owner: "{{ mysql_user }}"
    group: "{{ mysql_group }}"
    mode: "0755"

- name: Create base MySQL directory structure
  ansible.builtin.file:
    path: "/data/mysql"
    state: directory
    owner: "{{ mysql_user }}"
    group: "{{ mysql_group }}"
    mode: "0750"

- name: Create MySQL data directory
  ansible.builtin.file:
    path: "{{ mysql_data_dir }}"
    state: directory
    owner: "{{ mysql_user }}"
    group: "{{ mysql_group }}"
    mode: "0750"

- name: Set immediate SELinux context for MySQL data directory
  ansible.builtin.shell:
    cmd: chcon -R -u system_u -r object_r -t mysqld_db_t {{ mysql_data_dir }}
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Set immediate SELinux context for MySQL log directory
  ansible.builtin.shell:
    cmd: chcon -R -u system_u -r object_r -t mysqld_log_t {{ mysql_log_dir }}
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install policycoreutils-python-utils for semanage (required for persistent SELinux policies)
  ansible.builtin.yum:
    name: policycoreutils-python-utils
    state: present
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Set persistent SELinux policy for MySQL data directory
  ansible.builtin.shell:
    cmd: semanage fcontext -a -t mysqld_db_t "{{ mysql_data_dir }}(/.*)?"
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Set persistent SELinux policy for MySQL log directory
  ansible.builtin.shell:
    cmd: semanage fcontext -a -t mysqld_log_t "{{ mysql_log_dir }}(/.*)?"
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Restore SELinux context for MySQL directories
  ansible.builtin.shell:
    cmd: restorecon -Rv /data/mysql
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Check if MySQL config exists
  ansible.builtin.stat:
    path: /etc/my.cnf
  register: mysql_config

- name: Deploy MySQL configuration file
  ansible.builtin.template:
    src: my.cnf.j2
    dest: /etc/my.cnf
    owner: root
    group: root
    mode: "0644"
    backup: yes
  notify: restart-mysql

- name: Ensure MySQL log directory exists with correct permissions
  ansible.builtin.file:
    path: "{{ mysql_log_dir }}"
    state: directory
    owner: "{{ mysql_user }}"
    group: "{{ mysql_group }}"
    mode: "0750"

- name: Pre-create error.log file with correct permissions
  ansible.builtin.file:
    path: "{{ mysql_log_dir }}/error.log"
    state: touch
    owner: "{{ mysql_user }}"
    group: "{{ mysql_group }}"
    mode: "0640"
    modification_time: now
    access_time: now

- name: Start MySQL service
  ansible.builtin.systemd:
    name: mysqld
    state: started
    enabled: yes
  notify: start-mysql
