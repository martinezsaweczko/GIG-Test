[defaults]
inventory = ./inventory
roles_path = ./roles
host_key_checking = False
remote_user = vagrant
gather_facts = yes
interpreter_python = auto_silent
vault_password_file = ../.vault_password
deprecation_warnings = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o HostKeyAlgorithms=+ssh-rsa -o AddKeysToAgent=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[privilege_escalation]
become = True
become_method = sudo
become_user = root
